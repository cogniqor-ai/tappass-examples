# TapPass Pipeline: Standard
# Production-ready governance for most workloads.
# ~37 steps. Blocks PII, injection, secrets. Full audit trail.

categories:
  before:
    access_control:
      on_detection: block
      steps:
        validate_input: {}
        rate_limit:
          max_calls: 50
          window_seconds: 3600
        budget_enforcement:
          max_cost_usd: 100.0
          window: daily

    data_protection:
      on_detection: block
      steps:
        detect_pii: {}
        detect_secrets: {}
        pii_tokenize: {}
        detect_infra: {}
        detect_business: {}
        unicode_attack: {}

    threat_detection:
      on_detection: block
      steps:
        detect_injection:
          threshold: 0.6
        detect_escalation: {}
        detect_exfiltration: {}

    classify_and_prepare:
      on_detection: log
      steps:
        classify_data: {}
        tool_filter: {}

  call:
    route_and_execute:
      on_detection: block
      steps:
        call_llm: {}
        call_tool: {}
        scan_tool_calls: {}
        tool_permissions: {}
        tool_constraints: {}

  after:
    response_safety:
      on_detection: redact
      steps:
        scan_output: {}
        pii_restore: {}
        shell_bleed: {}
        taint_check: {}

    tracking:
      on_detection: log
      steps:
        cost_tracking: {}
        loop_guard:
          max_iterations: 25
